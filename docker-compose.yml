services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rdengine
      POSTGRES_PASSWORD: rdengine
      POSTGRES_DB: rdengine
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - internal
      - web
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rdengine"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - internal
      - web
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant-data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    networks:
      - internal
      - web
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - internal
      - web
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/rd-documents --ignore-existing;
      mc anonymous set none local/rd-documents;
      exit 0;
      "
    networks:
      - internal

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: research_documents
      MODEL_CACHE_DIR: /app/model-cache
    volumes:
      - model-cache:/app/model-cache
    depends_on:
      qdrant:
        condition: service_started
    networks:
      - internal
      - web
    deploy:
      resources:
        limits:
          memory: 4G

volumes:
  postgres-data:
  redis-data:
  qdrant-data:
  minio-data:
  model-cache:

networks:
  # `internal` was originally `internal: true` for full air-gap.
  # During local dev we need host access for the Next.js process and the launcher,
  # so this is now a regular bridge network. In production deployment on a dedicated
  # VM, restore `internal: true` and run Next.js inside Docker as well.
  internal:
    driver: bridge
  web:
    driver: bridge
