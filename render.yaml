# Render Blueprint — R&D Research Engine
#
# Services on the same Render account can reach each other on the private network
# using just the service name as the hostname (e.g. http://rd-qdrant:6333).
#
# After clicking "Apply" in Render, you'll be prompted to:
#   1. ANTHROPIC_API_KEY      (Claude key with credits)
#   2. S3_*  (Cloudflare R2 or AWS S3 — set in BOTH rd-web and rd-worker)

databases:
  - name: rd-postgres
    databaseName: rdengine
    user: rdengine
    plan: free  # 90-day expiry — upgrade to Starter ($7/mo) for production

services:
  # ─── Redis (managed) ───
  - type: keyvalue
    name: rd-redis
    plan: free
    ipAllowList: []  # internal-only

  # ─── Qdrant Vector DB (private service, Docker image) ───
  - type: pserv
    name: rd-qdrant
    runtime: image
    image:
      url: docker.io/qdrant/qdrant:latest
    plan: starter
    disk:
      name: qdrant-data
      mountPath: /qdrant/storage
      sizeGB: 5

  # ─── FastAPI ML Service ───
  - type: web
    name: rd-ml-service
    runtime: docker
    dockerfilePath: ./ml-service/Dockerfile
    dockerContext: ./ml-service
    plan: standard  # 2 GB RAM — required for PyTorch + sentence-transformers
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: QDRANT_URL
        value: http://rd-qdrant:6333
      - key: QDRANT_COLLECTION
        value: research_documents
      - key: MODEL_CACHE_DIR
        value: /app/model-cache
      - key: ANTHROPIC_API_KEY
        sync: false

  # ─── Next.js Web App ───
  - type: web
    name: rd-web
    runtime: node
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npx prisma db push --accept-data-loss && npm start
    plan: starter
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: rd-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: rd-redis
          property: connectionString
      - key: ML_SERVICE_URL
        value: http://rd-ml-service:8000
      - key: QDRANT_URL
        value: http://rd-qdrant:6333
      - key: QDRANT_COLLECTION
        value: research_documents
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        sync: false  # Set this to your final domain after first deploy
      - key: NODE_ENV
        value: production
      - key: S3_ENDPOINT
        sync: false
      - key: S3_REGION
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false

  # ─── BullMQ Ingestion Worker (background) ───
  - type: worker
    name: rd-worker
    runtime: node
    buildCommand: npm ci && npx prisma generate
    startCommand: npm run worker
    plan: starter
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: rd-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: rd-redis
          property: connectionString
      - key: ML_SERVICE_URL
        value: http://rd-ml-service:8000
      - key: NODE_ENV
        value: production
      - key: S3_ENDPOINT
        sync: false
      - key: S3_REGION
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
